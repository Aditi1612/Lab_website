name: Update Google Scholar Metrics

on:
  schedule:
    - cron: "0 6 * * *"   # Every day at 06:00 UTC
  workflow_dispatch:        # Allow manual trigger from GitHub Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install scholarly
        run: pip install scholarly

      - name: Fetch Scholar metrics
        run: python scripts/update_scholar.py

      - name: Commit updated data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/scholar.json
          git diff --staged --quiet || git commit -m "Update Google Scholar metrics [skip ci]"
          git push
